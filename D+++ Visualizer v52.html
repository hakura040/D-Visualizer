/**
 * UIRenderer Class - Version 52 (Full & Robust Specification)
 * Format D+++ Visualizer v52 - Step 6.1: View Layer
 * * 【V52 修正・完全実装内容】
 * 1. アーティファクト除去: 構文エラーや可読性低下の原因となる引用タグを全域から排除。
 * 2. Mermaid文法強化: 状態・遷移定義の各行末にセミコロンを追加し、トークン結合を防止。
 * 3. 分離強化: スタイル定義（classDef）の前に明確な分離コメントを追加。
 * 4. アトミック描画シーケンス: Lock -> Async Render -> Wait -> Bind -> Unlock の手順を厳守。
 * 5. カバレッジ視覚化: calculateCoverage() の結果をプログレスバーと数値に物理反映。
 * 6. 解析レポート連携: Step 7 の静的解析結果をリスト化し、エディタジャンプ機能を実装。
 */
class UIRenderer {
  /**
   * @param {UIController} uiController - 親となるUIコントローラーのインスタンス
   */
  constructor(uiController) {
    this.ui = uiController; // UIControllerへの参照
    this.els = uiController.els; // DOMキャッシュの共有
  }

  /* ========================================================================
     1. DASHBOARD & STATUS UPDATES (Section 2.1)
     ======================================================================== */

  /**
   * シミュレーターの状態（HACEサイクル）と統計情報をUIに反映します。
   * @param {AtomicSimulator} sim - シミュレーターインスタンス
   */
  async updateDashboard(sim) {
    if (!sim || !this.els.simStatus) return;

    // 1.1 ステータス表示の更新
    if (sim.simState === "Error_Lock") {
      this.els.simStatus.textContent = "ERROR_LOCK";
      this.els.simStatus.className = ""; // クラスリセット
      this.els.simStatus.style.color = "var(--action)";
    } else if (sim.simState === "Idle") {
      this.els.simStatus.textContent = `READY: ${sim.currentStateID || "NONE"}`;
      this.els.simStatus.className = "status-ready";
      this.els.simStatus.style.color = "var(--entry)";
    } else {
      this.els.simStatus.textContent = sim.simState.toUpperCase();
      this.els.simStatus.className = "";
      this.els.simStatus.style.color = "var(--primary)";
    }

    // 1.2 LED操作: HACEフェーズの点灯制御
    const phaseLeds = document.querySelectorAll('.led-label');
    phaseLeds.forEach(led => led.classList.remove('active'));
    const currentPhaseLed = document.getElementById(`phase-${sim.simState.toLowerCase()}`);
    if (currentPhaseLed) {
      currentPhaseLed.classList.add('active');
    }

    // 1.3 カバレッジ更新 (V52重要要件)
    const coveragePercent = this.ui.calculateCoverage ? this.ui.calculateCoverage() : 0;
    
    // パーセンテージテキスト反映
    if (this.els.dashboardCoverage) {
      this.els.dashboardCoverage.textContent = `${coveragePercent}%`;
    }

    // プログレスバー（width）反映
    const progressBar = document.getElementById('coverage-progress-fill');
    if (progressBar) {
      progressBar.style.width = `${coveragePercent}%`;
    }

    // 1.4 Undo制御
    const undoBtn = document.getElementById('btn-sim-undo');
    if (undoBtn) {
      undoBtn.disabled = !sim.history || sim.history.length === 0;
    }

    // 1.5 UIロック（Busy状態）の反映
    const isBusy = sim.simState !== "Idle" && sim.simState !== "Error_Lock";
    document.body.classList.toggle('sim-busy', isBusy);

    // 1.6 変数テーブルの同期更新
    this.renderVariableTable(sim.ctxManager.getSnapshot());
    // 重要：renderMermaidの完了を「待つ」
    if (this.renderMermaid) {
      await this.renderMermaid(); 
      // await することで、図が確実にDOM（画面）に配置された後に
      // highlightActiveElements が実行されるようになります。
      this.highlightActiveElements(sim);
    }
  }

  /* ========================================================================
     2. ATOMIC MERMAID RENDERING (Section 4.2)
     ======================================================================== */

  /**
   * D+++定義からMermaid図をアトミックに生成・描画します。
   * 手順: Lock -> Async Render -> Wait -> Bind -> Restore -> Unlock 
   */
async renderMermaid() {
    if (!this.els.mermaidDiv || !this.ui.data) return;
    document.body.classList.add('sim-busy');

    try {
      const lines = ["stateDiagram-v2"];
      lines.push("%%{init: {'theme': 'neutral', 'themeVariables': { 'fontSize': '12px' }}}%%");
      lines.push(this.ui.layout === 'TD' ? "  direction TB" : "  direction LR");

      const escape = (str) => this.escapeHtml(str);
      const safeId = (id) => "sid" + String(id).replace(/[^a-zA-Z0-9]/g, '');

      // --- 1. 階層構造（State Tree）の構築 (V51からの復元) ---
      const stateTree = {};
      this.ui.data.states.forEach(s => {
        const parts = s.id.split('.'); 
        let curr = stateTree;
        parts.forEach((p, i) => { 
          if (!curr[p]) { 
            const id = parts.slice(0, i+1).join('.'); 
            curr[p] = { id, safeId: safeId(id), children: {} }; 
          } 
          curr = curr[p].children; 
        });
      });

      // --- 2. 再帰的な状態定義の生成 (V51準拠) ---
      const build = (tree, indent = "  ") => {
        let s = ""; 
        for (const k in tree) {
          const n = tree[k];
          if (Object.keys(n.children).length > 0) {
            // 子がある場合は { } で囲む
            s += `${indent}state "${escape(n.id)}" as ${n.safeId} {\n${build(n.children, indent + "  ")}${indent}}\n`;
          } else {
            // 子がない場合は単一の状態として定義
            s += `${indent}state "${escape(n.id)}" as ${n.safeId}\n`;
          }
        }
        return s;
      };

      lines.push(build(stateTree));

      // --- 3. 遷移定義 (V16形式を維持) ---
      this.ui.data.transitions.forEach(t => {
        const src = safeId(t.source);
        const tgt = safeId(t.target || t.source);
        const trigger = escape(t.trigger || "ε");
        const label = `: "<span class='edge-label-btn' data-idx='${t.lineIndex}'>${trigger}</span>"`;
        lines.push(`  ${src} --> ${tgt} ${label}`);
      });

      const code = lines.join('\n');
      console.log("--- [V52 HIERARCHICAL] CLEAN DSL ---\n", code);

      // --- 4. 描画とスタイル適用 ---
      const { svg } = await mermaid.render(`mermaid-svg-${Date.now()}`, code);
      this.els.mermaidDiv.innerHTML = svg;

      // わずかな待機を入れてスタイルを適用
      await new Promise(resolve => setTimeout(resolve, 50));
      this.applySvgStyles(); 
      this.bindSvgEvents();

      // ★ここが問題の箇所：描画関数の中で自らハイライトを呼んでいた
      if (this.ui.simCtrl?.simulator) {
        this.highlightActiveElements(this.ui.simCtrl.simulator);
      }
      this.applyZoom();

    } catch (e) {
      console.error("[UIRenderer] Hierarchical Render Error:", e);
    } finally {
      document.body.classList.remove('sim-busy');
    }
  }

/**
   * SVG要素に対してクリックイベントをバインドします。
   * 階層構造化に伴う複雑なID体系に対応し、確実にエディタジャンプを実行します。
   */
  bindSvgEvents() {
    if (!this.els.mermaidDiv) return;

    // 1. 状態ノード（.node）のバインド
    this.els.mermaidDiv.querySelectorAll('.node').forEach(node => {
      node.onclick = () => {
        // Mermaidの生成IDからターゲットとなる sid... 文字列を抽出
        const idParts = node.id.split('-');
        const sidFromSvg = idParts[idParts.length - 2] || idParts[idParts.length - 1];
        
        // 描画ロジックと同じルールでIDを生成して照合（SSOT維持）
        const state = this.ui.data.states.find(s => {
          const expectedSid = "sid" + String(s.id).replace(/[^a-zA-Z0-9]/g, '');
          return expectedSid === sidFromSvg;
        });

        if (state) {
          this.ui.jumpToLine(state.lineIndex);
          this.showToast(`Selected: ${state.id}`, "info");
        } else {
          // フォールバック: 階層名の一部から検索
          const fallback = this.ui.data.states.find(s => sidFromSvg.includes(s.safeId));
          if (fallback) this.ui.jumpToLine(fallback.lineIndex);
        }
      };
    });

    // 2. 遷移ラベル（.edge-label-btn）のバインド
    this.els.mermaidDiv.querySelectorAll('.edge-label-btn').forEach(label => {
      label.onclick = (e) => {
        e.stopPropagation();
        const lineIdx = parseInt(label.dataset.idx);
        if (!isNaN(lineIdx)) {
          this.ui.jumpToLine(lineIdx);
        }
      };
    });
  }

  /* ========================================================================
     3. VARIABLE & ANALYSIS RENDERING (Section 2.3 / 2.4)
     ======================================================================== */

  /**
   * 現在の変数値（コンテキスト）を描画します。
   * @param {Object} ctx - 変数データ
   */
/**
   * 変数テーブルをレンダリングし、変化があった値にフラッシュ効果を適用します。
   */
  renderVariableTable(ctx) {
    // 1. ガードとバッファの初期化
    if (!this.els.varTable || !ctx) return;
    if (!this.prevContext) this.prevContext = {};

    let html = '<table class="var-table"><thead><tr><th>Key</th><th>Value</th></tr></thead><tbody>';
    
    // 表示順を安定させるためにキーをソート
    const entries = Object.entries(ctx).sort((a, b) => a[0].localeCompare(b[0]));

    entries.forEach(([key, val]) => {
      const displayVal = (typeof val === 'object') ? JSON.stringify(val) : val;
      
      // 2. 変化判定ロジックの注入
      // 前回の値が存在し、かつ現在の値と異なる場合のみクラスを付与
      const hasChanged = this.prevContext.hasOwnProperty(key) && this.prevContext[key] !== val;
      const flashClass = hasChanged ? "flash-update" : "";

      html += `
        <tr>
          <td class="var-key">${this.escapeHtml(key)}</td>
          <td class="var-val ${flashClass}" id="var-row-${this.escapeHtml(key)}">
            ${this.escapeHtml(String(displayVal))}
          </td>
        </tr>
      `;
    });

    html += '</tbody></table>';
    this.els.varTable.innerHTML = html;

    // 3. 次回の比較のためにディープコピーを保存
    // 参照渡しを避けるため JSON を介して値を「凍結」保存します
    this.prevContext = JSON.parse(JSON.stringify(ctx));
  }

  /**
   * 静的解析レポートを表示します (Step 7 連携)。
   * @param {Array} report - エラー/警告の配列
   */
  renderAnalysis(report) {
    if (!this.els.analysisList || !this.els.analysisPanel) return;

    if (!report || report.length === 0) {
      this.els.analysisPanel.style.display = 'none';
      return;
    }

    this.els.analysisPanel.style.display = 'block';
    this.els.analysisList.innerHTML = report.map(item => {
      const typeClass = item.type === 'error' ? 'analysis-error' : 'analysis-warn';
      return `
        <div class="analysis-item ${typeClass}" onclick="window.ui.jumpToLine(${item.lineIndex})">
          <span class="analysis-loc">Line ${item.lineIndex + 1}:</span>
          <span class="analysis-msg">${this.escapeHtml(item.message)}</span>
        </div>
      `;
    }).join('');
  }

  /* ========================================================================
     4. HIGHLIGHTS & HELPERS
     ======================================================================== */

/**
   * 現在のアクティブな状態ノードを強調表示します。
   * 遷移実行中(Busy)は、その経路の赤色ハイライトを維持します。
   */
  highlightActiveElements(sim) {
    if (!this.els.mermaidDiv || !sim) return;

    // 1. 【条件付きクリア】
    // シミュレーターが完全に「Idle」または「Error」になった時だけ、矢印の赤色を一掃する
    if (sim.simState === "Idle" || sim.simState === "Error_Lock") {
      this.els.mermaidDiv.querySelectorAll('.diagram-highlight').forEach(el => {
        el.classList.remove('diagram-highlight');
      });
      this.els.mermaidDiv.querySelectorAll('.edge-hover-active').forEach(el => {
        el.classList.remove('edge-hover-active');
      });
    }

    // 2. ノード（箱）のハイライト更新
    this.els.mermaidDiv.querySelectorAll('.state-active').forEach(el => {
      el.classList.remove('state-active');
    });

    const sid = "sid" + sim.currentStateID.replace(/\./g, '');
    const node = this.els.mermaidDiv.querySelector(`[id*="${sid}"]`);
    if (node) {
      node.classList.add('state-active');
    }

    // 3. 【遷移の維持】
    // 現在実行中の遷移（currentTransition）がある場合、その矢印を強制的に光らせる
    // これにより、HACEサイクル（Exiting→Acting→Updating...）の間、赤色が維持されます。
    if (sim.currentTransition) {
      this.highlightEdge(sim.currentTransition.lineIndex, true);
    }
  }

/**
   * 指定した行番号へエディタをスクロールさせ、強調表示します。
   * @param {number} lineIndex 
   */
  scrollToLine(lineIndex) {
    // UIController に実装済みのジャンプ機能を呼び出す
    this.ui.jumpToLine(lineIndex);
  }


/**
   * 描画されたSVGに対して、カバレッジに応じたスタイルを直接適用します。
   */
  applySvgStyles() {
    if (!this.els.mermaidDiv || !this.ui.data) return;
    
    const visitedStates = this.ui.simCtrl?.simulator?.coverage?.visitedStates;

    // 状態ノードへのスタイル適用
    this.ui.data.states.forEach(s => {
      if (visitedStates?.has(s.id)) {
        const sid = "sid" + String(s.id).replace(/[^a-zA-Z0-9]/g, '');
        const nodeEl = this.els.mermaidDiv.querySelector(`[id*="${sid}"]`);
        if (nodeEl) {
          nodeEl.querySelectorAll('rect, path, circle, polygon').forEach(shape => {
            shape.classList.add('cov-visited');
          });
        }
      }
    });
  }

/**
   * エッジ（遷移の線）を強調表示します。
   * DSL(classDef)を使わず直接DOMを操作します。
   */
  highlightEdge(lineIndex, active) {
    if (!this.els.mermaidDiv) return;

    // 1. ラベル(ボタン)を特定
    const labelBtn = this.els.mermaidDiv.querySelector(`.edge-label-btn[data-idx='${lineIndex}']`);
    if (!labelBtn) return;

    const edgeContainer = labelBtn.closest('.edgeLabel');
    if (edgeContainer) {
      // 2. クラスの付け替えは維持（CSS側での制御用）
      edgeContainer.classList.toggle('edge-hover-active', active);

      // 3. 線(path)の特定と直接スタイル上書き
      const pathId = edgeContainer.id?.replace(/^L-/, '');
      if (pathId) {
        const path = this.els.mermaidDiv.querySelector(`path[id*="${pathId}"]`);
        if (path) {
          // V51方式: !important に相当する優先度で直接色を流し込む
          if (active) {
            path.style.stroke = 'var(--action)'; // 赤色 (#ef4444)
            path.style.strokeWidth = '3.5px';
            path.style.filter = 'drop-shadow(0 0 5px rgba(239, 68, 68, 0.4))';
          } else {
            // 元の状態（Mermaidのデフォルト）に戻す
            path.style.stroke = '';
            path.style.strokeWidth = '';
            path.style.filter = '';
          }
        }
      }
    }
  }
  /**
   * ズーム倍率を適用します。
   */
  applyZoom() { 
    if (this.els.mermaidDiv) {
      const svg = this.els.mermaidDiv.querySelector('svg');
      if (svg) {
        svg.style.transform = `scale(${this.ui.zoom})`;
        svg.style.transformOrigin = "top left";
      }
    }
  }

  /**
   * トースト通知を表示します。
   */
  showToast(msg, type = 'info') {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.className = `toast show ${type}`;
    if (this._toastTimer) clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

/**
   * 手動シミュレーション用のトリガーボタンをパネルに描画します。
   */
renderQuickActions(sim) {
    const container = document.getElementById('trigger-panel'); 
    if (!container) return;

    // 1. ヘッダーと「テストケース選択」の追加
    // 既存のスタイル（panel-label）を維持しつつ、セレクトボックスを挿入
    let headerHtml = `
      <div class="panel-label"><i class="ph ph-lightning-bolt"></i> Quick Actions</div>
      <div style="padding: 0 4px 10px 4px; border-bottom: 1px dashed var(--border-color); margin-bottom: 10px;">
        <div style="font-size: 10px; color: #94a3b8; margin-bottom: 4px; font-weight: bold;">SCENARIO SELECT (TABLE C)</div>
        <select id="test-case-selector" style="width:100%; padding:5px; font-size:11px; border:1px solid var(--border-color); border-radius:4px; background:#fcfcfd;">
          <option value="">-- Select Scenario --</option>
          ${(this.ui.data.testCases || []).map(tc => `<option value="${tc.id}">${tc.id}: ${tc.initialState}</option>`).join('')}
        </select>
      </div>
    `;
    container.innerHTML = headerHtml;

    // イベント配線
    const selector = document.getElementById('test-case-selector');
    selector.onchange = (e) => {
      if (e.target.value && this.ui.simCtrl) {
        this.ui.simCtrl.loadTestCase(e.target.value);
      }
    };

    // 2. 既存のロジック：ビジー状態の表示
    if (sim.simState !== "Idle") {
      const busy = document.createElement('div');
      busy.className = "busy-indicator"; 
      busy.innerHTML = `<div class="spinner"></div><span>Busy: ${sim.simState}...</span>`;
      container.appendChild(busy);
      return;
    }

    const available = sim.getAvailableTransitions();
    if (available.length === 0) {
      const none = document.createElement('div');
      none.style = "padding:10px; font-size:11px; color:var(--action); text-align:center;";
      none.textContent = "No Available Actions";
      container.appendChild(none);
      return;
    }

    // ボタンリストの構築
    const list = document.createElement('div');
    list.className = 'trigger-list';

    available.forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'trigger-btn';
      // 稲妻アイコンの復活
      btn.innerHTML = `<i class="ph-fill ph-lightning"></i> <span>${this.escapeHtml(t.trigger || "ε")}</span>`;
      
      // UX復元: ホバー時の図との連動
      btn.onmouseenter = () => this.highlightEdge(t.lineIndex, true);
      btn.onmouseleave = () => this.highlightEdge(t.lineIndex, false);
      
      // クリックでシミュレーターを駆動
      btn.onclick = () => {
        if (this.ui.simCtrl) {
          this.ui.simCtrl.simulator.trigger(t);
        }
      };
      list.appendChild(btn);
    });
    container.appendChild(list);
  }



/**
   * HTMLエスケープ処理 (V51方式: 全角置換によるパーサー保護)
   * Mermaidの構文破壊を防ぎつつ、記号の視覚的な意味を維持します。
   */
  escapeHtml(str) {
    if (!str) return "";
    return String(str)
      .replace(/&/g, '＆')
      .replace(/</g, '＜')
      .replace(/>/g, '＞')
      .replace(/"/g, '”')
      .replace(/'/g, "’");
  }
}

// --- PASTE STEP 6.2: SimController ---
/**
 * SimController Class - Version 52 (Full & Final Specification)
 * Format D+++ Visualizer v52 - Step 6.2: Logic Control Layer
 * * 【V52 修正・完全統合内容】
 * 1. 不正タグ除去: 構文エラーの原因となる引用タグ（Artifacts）を全域から排除。
 * 2. 起動シーケンスの厳格化: boot()実行と初期カバレッジセットのクリアを物理的に実装。
 * 3. 排他制御の徹底: 手動操作（step/trigger/undo）介入時に直ちにオートプレイを停止。
 * 4. バッチテスト・カバレッジ統合: テスト結果（visitedLines）を ui.coverageSet へマージ。
 * 5. 異常系ガード: Error_Lock 検知時のタイマー即時破棄とユーザーへの警告トースト。
 * 6. 既存機能の完全維持: step, undo, trigger, setSpeed 等の全委譲メソッドを省略せず記述。
 */
class SimController {

  /**

   * @param {UIController} uiController - 親となるUIコントローラーのインスタンス

   */

constructor(uiController) {
    this.ui = uiController;
    this.simulator = null;
    this.timer = null; // timer に統一
    this.speed = 500;  // speed に統一
    // シナリオ再生用の管理変数
    this.currentScenario = []; 
    this.scenarioIndex = 0;
  }



  /* ========================================================================

     1. SIMULATION LIFECYCLE (Section 2.1)

     ======================================================================== */



  /**
   * シミュレーターを新規インスタンス化し、初期変数を適用して起動します。
   * SSOT Section 2.1 に基づく厳格な初期化シーケンス。
   */

  startSimulation() {
    try {
      // 1.1 現在実行中のオートプレイを停止し、表示上のカバレッジ履歴をクリア
      this.stopAutoPlay();
      if (this.ui.coverageSet) {
        this.ui.coverageSet.clear();
      }



      // 1.2 初期変数の解析とマージ
      // 構文解析時に自動抽出されたデフォルト変数を取得
      const finalContext = this.ui.analyzeVariables ? this.ui.analyzeVariables() : {};

      // UIの initial-context フィールド（x=1形式など）からの入力をパースして上書き
      try {
        const initialContextStr = this.ui.els.initialCtx ? this.ui.els.initialCtx.value : "";
        const inputData = this.ui.testRunner._parseContext(initialContextStr);
        Object.assign(finalContext, inputData);
      } catch (contextError) {
        console.warn("[SimController] Context Input Error:", contextError);
        this.ui.renderer.showToast("Context input error. Using defaults.", "warn");
      }

      // 1.3 シミュレーションエンジンの実体化 (Step 3 & Step 4 連携)
     const ctxManager = new ContextManager(finalContext);
      this.simulator = new AtomicSimulator(
      this.ui.data, // ★ ここを data.states ではなく data 全体にする
      ctxManager,
      this.ui.evaluator,
      { onUpdate: (sim) => this.updateSimUI(sim) }
      );


     // 1.4 ブートシーケンスの実行 (SSOT 3.2 連携)
      // 初期状態の Entry/Auto-Entry を HACE.Idle になるまで進行させる
      this.simulator.boot();

      // 1.5 初期状態の反映
      this.updateSimUI(this.simulator);
     
      this.ui.renderer.showToast(`HACE Engine Booted: ${Object.keys(finalContext).length} variables active.`, "success");

    } catch (e) {
      console.error("[SimController] Simulator Start Critical Error:", e);
      this.ui.renderer.showToast(`Start Failed: ${e.message}`, "error");
    }
  }

/**
   * Table Cから選択されたテストケースをロードし、初期状態をセットアップします。
   */
  loadTestCase(id) {
    const testCase = this.ui.data.testCases.find(tc => tc.id === id);
    if (!testCase) return;

    this.stopAutoPlay();
    console.log(`[SimController] Loading Test Case: ${id}`);

    // シナリオの準備（インデックスをリセットして待機）
    this.currentScenario = testCase.scenario ? testCase.scenario.split(',').map(s => s.trim()) : [];
    this.scenarioIndex = 0;    

    try {
      // 1. 変数の準備（既存の analyzeVariables と Table C の Context をマージ）
      const finalContext = this.ui.analyzeVariables ? this.ui.analyzeVariables() : {};
      const tcContext = this.ui.testRunner ? this.ui.testRunner._parseContext(testCase.context || "") : {};
      Object.assign(finalContext, tcContext);

      // 2. シミュレーターの再生成（startSimulationと同じ作法）
      const ctxManager = new ContextManager(finalContext);
      this.simulator = new AtomicSimulator(
        this.ui.data, 
        ctxManager, 
        this.ui.evaluator, 
        { 
          onStateChange: (sim) => this.updateSimUI(sim),
          onFailure: (msg) => this.ui.renderer.showToast(msg, "error")
        }
      );

      // 3. テストケース指定の初期状態を強制セットして起動
      this.simulator.currentStateID = testCase.initialState;
      this.simulator.boot();
      
      this.updateSimUI(this.simulator);
      this.ui.renderer.showToast(`Scenario Loaded: ${id}`, "success");
    } catch (e) {
      console.error("Failed to load test case:", e);
      this.ui.renderer.showToast("Load Failed: " + e.message, "error");
    }
  }

  /**
   * シミュレーターからの更新通知を受け取り、UI全体を同期させます。
   * @param {AtomicSimulator} sim - シミュレーターインスタンス
   */
  updateSimUI(sim) {
    if (!sim) return;

    // 2.1 表示レイヤーへの委譲 (Dashboard, VariableTable, Highlights)
    this.ui.renderer.updateDashboard(sim);
   
    // クイック操作ボタン（トリガーリスト）の再生成
    if (this.ui.renderer.renderQuickActions) {
      this.ui.renderer.renderQuickActions(sim);
    }

    // 2.2 カバレッジ追跡とエディタ同期 (Section 3)
    if (sim.currentTransition) {
      const lineIdx = sim.currentTransition.lineIndex;
     
      // 通過した遷移の行番号をカバレッジセットに記録
      if (this.ui.coverageSet) {
        this.ui.coverageSet.add(lineIdx);
      }
     
      // 実行中の行をエディタ上で強調・ジャンプ
      if (this.ui.renderer.scrollToLine) {
        this.ui.renderer.scrollToLine(lineIdx);
      }
    } else if (sim.currentStateID) {
      // 遷移していない待機時は現在の状態定義行を表示
      const stateData = this.ui.data.states.find(s => s.id === sim.currentStateID);
      if (stateData && this.ui.renderer.scrollToLine) {
        this.ui.renderer.scrollToLine(stateData.lineIndex);
      }
    }
  }
  /* ========================================================================
     2. INTERACTIVE CONTROLS (Manual Intervention)
     ======================================================================== */

  /**
   * 手動で1ステップ実行します。
   * 【V52重要】手動操作介入時はオートプレイを直ちに解除する。
   */
  step() {
    this.stopAutoPlay();
    if (this.simulator) {
      this.simulator.step();
    }
  }

  /**
   * 履歴を1つ戻します。
   */
  undo() {
    this.stopAutoPlay();
    if (this.simulator) {
      this.simulator.undo();
    }
  }

  /**
   * グラフクリック等による手動遷移をトリガーします。
   * @param {Object} transition - 遷移定義
   */
  trigger(transition) {
    // 排他制御: 手動介入時は即座に自動実行タイマーを破棄
    this.stopAutoPlay();
    if (this.simulator) {
      this.simulator.trigger(transition);
    }
  }

  /* ========================================================================
     3. AUTO-PLAY CONTROL (Section 2.2 / 4)
     ======================================================================== */

  /**
   * オートプレイを開始します。
   */
/**
   * オートプレイを開始します。
   * 再帰的setTimeoutにより、エンジンのフェーズ進行と同期させます。
   */
startAutoPlay() {
    this.stopAutoPlay(); // 二重起動防止

    const autoLoop = () => {
      if (!this.simulator) return;

      if (this.simulator.simState === "Error_Lock") {
        this.stopAutoPlay();
        return;
      }

      // --- 修正：Idle時でも停止させない ---
      if (this.simulator.simState === "Idle") {
        // --- 修正：表Cのシナリオを順番に実行するロジック ---
        if (this.currentScenario && this.scenarioIndex < this.currentScenario.length) {
          const nextTrigger = this.currentScenario[this.scenarioIndex].trim();
          
          // そのトリガーが現在の状態で実行可能か確認
          const transition = this.simulator.getAvailableTransitions().find(t => t.trigger === nextTrigger);
          
          if (transition) {
            this.simulator.trigger(transition);
            this.scenarioIndex++; // 次のステップへ
          } else {
            // シナリオ通りのトリガーが押せない場合は、安全のため停止
            this.ui.renderer.showToast(`Scenario blocked: ${nextTrigger} not available`, "warn");
            this.stopAutoPlay();
            return;
          }
        } else if (this.currentScenario.length > 0) {
          // 最後まで到達したら終了
          this.ui.renderer.showToast("Scenario finished", "success");
          this.stopAutoPlay();
          return;
        }
      } else {
        // 遷移フェーズ進行中はエンジンだけを1ステップ進める（ここはOK！）
        this.simulator.step();
      }
    };

    this.timer = setTimeout(autoLoop, this.speed);
    if (this.ui.els.btnPlay) this.ui.els.btnPlay.classList.add('active');
    this.updateSimUI(this.simulator);
  }

  /**
   * オートプレイを停止し、リソースを完全に解放します。
   */
  stopAutoPlay() {
    if (this.timer) {
      clearTimeout(this.timer); // 修正
      this.timer = null;        // 修正
    }
    if (this.ui.els.btnPlay) {
      this.ui.els.btnPlay.classList.remove('active');
    }
  }

  /**
   * 実行速度をミリ秒単位で設定します。
   * @param {string|number} val 
   */
  setSpeed(val) {
    this.speed = parseInt(val, 10); // 統一した名前に修正
    if (this.timer) {               // 統一した名前に修正
      this.startAutoPlay();
    }
  }

  /* ========================================================================
     4. BATCH TEST EXECUTION (Section 2.3)
     ======================================================================== */

  /**
   * テストケースを一括実行し、結果とカバレッジをマージします。
   */
  runBatchTest() {
    // 4.1 オートプレイの停止 (排他制御)
    this.stopAutoPlay();

    if (!this.ui.data || !this.ui.data.testCases) return;

    // 4.2 TestRunner によるバッチ実行 (Step 5 連携)
    const report = this.ui.testRunner.runAll(
      this.ui.data.testCases, 
      this.ui.data.states, 
      this.ui.data.transitions
    );

    // 4.3 結果テーブル (#test-body) の描画
    if (this.ui.els.testTable) {
      this.ui.els.testTable.innerHTML = report.results.map(r => {
        const statusClass = `result-${r.status.toLowerCase()}`;
        const reasonHtml = r.status === "FAIL" 
          ? `<div style="color:var(--action); font-size:10px;">${this.ui.renderer.escapeHtml(r.reason)}</div>` 
          : `<div style="color:#64748b; font-size:10px;">${this.ui.renderer.escapeHtml(r.reason || "-")}</div>`;

        return `
          <tr class="${statusClass}">
            <td>${this.ui.renderer.escapeHtml(r.id)}</td>
            <td style="font-weight:bold;">${r.status}</td>
            <td>${this.ui.renderer.escapeHtml(r.actual)}</td>
            <td style="font-family:monospace;">${reasonHtml}</td>
          </tr>
        `;
      }).join('');
    }

    // 4.4 カバレッジ統合 (V52重要仕様)
    // テストで通過した遷移行(visitedLines)を ui.coverageSet へマージ
    if (report.coverage && report.coverage.visitedLines) {
      report.coverage.visitedLines.forEach(lineIdx => {
        if (this.ui.coverageSet) {
          this.ui.coverageSet.add(lineIdx);
        }
      });
    }

    // 4.5 描画更新
    // マージされたカバレッジをダイアグラムの色付けに反映させる
    if (this.ui.renderer.renderMermaid) {
      this.ui.renderer.renderMermaid();
    }
    
    this.ui.renderer.showToast(`Batch Test Complete: ${report.results.length} cases executed.`, "info");
  }
}

// --- PASTE STEP 6.3: UIController ---
/**
 * UIController Class (Main Orchestrator)
 * Format D+++ Visualizer v52 - Step 6.3: Main Integration
 * * 【V52 修正・完全実装内容】
 * 1. 初期化順序の修正: this.data を最優先で初期化し、Analyzer に参照を渡すことで実行時エラーを防止。
 * 2. 不正タグ除去: 構文エラーの原因となる引用タグ（Artifacts）を全域から排除。
 * 3. 二重起動バグ修正: クラス外部の重複した初期化コードを削除。
 * 4. Step 7 Analyzer 統合: 構文解析直後に静的解析を実行し、不備を即座にレポート。
 * 5. 破壊的操作保護: ファイルインポート等のデータ上書き時にユーザー承認（Confirm）を強制。
 * 6. セッション管理: localStorage からの復旧と、新規セッション時のデフォルトテンプレート展開。
 * 7. 冗長な変数解析: 演算子や比較式から変数の型（数値/真偽値）を精密に抽出。
 */
class UIController {
  constructor() {
    // 1. システム状態管理プロパティ (SSOT Section 3) - 最優先で初期化
    this.data = { states: [], transitions: [], testCases: [] };
    this.varMeta = {};        // 変数型情報のキャッシュ
    this.varConfigs = {};     // スライダー設定 (min/max/step)
    this.coverageSet = new Set(); // 通過した行番号 (lineIndex) の集約
    this.zoom = 1.0;
    this.layout = 'TD';
    this.debounceTimer = null;

    // 2. 依存ロジックエンジンのインスタンス化 (SSOT 準拠)
    this.evaluator = new SafeEvaluator();      // Step 1
    this.parser = new DPlusPlusParser();        // Step 2
    this.testRunner = new TestRunner(this.evaluator); // Step 5
    this.analyzer = new DPlusPlusAnalyzer(this.data); // Step 7 (V52 新規統合 / 引数にthis.dataを渡す)
    
    // 3. DOM要素キャッシュの取得 (全サブクラス共有)
    this.els = this._cacheElements();

    // 4. サブコントローラーの初期化
    this.renderer = new UIRenderer(this);    // Step 6.1
    this.simCtrl = new SimController(this);  // Step 6.2

    // グローバル公開 (HTML内イベントハンドラからのアクセス用)
    window.ui = this;
    console.log("UIController V52: Orchestrator instance created with correct initialization order.");
  }

  /**
   * システムで使用する全ての DOM 要素をキャッシュします。
   * Optional Chaining 用に、存在しない場合も構造を維持します。
   * @private
   */
  _cacheElements() {
    return {
      editor: document.getElementById('editor'),
      gutter: document.getElementById('gutter'),
      mermaidDiv: document.getElementById('diagram'),
      varTable: document.getElementById('var-body'),
      testTable: document.getElementById('test-body'),
      tabs: document.querySelectorAll('.tab-btn'),
      panes: document.querySelectorAll('.tab-pane'),
      initialCtx: document.getElementById('initial-context'),
      analysisPanel: document.getElementById('analysis-panel'),
      analysisList: document.getElementById('analysis-list'),
      toast: document.getElementById('toast'),
      modal: document.getElementById('code-modal'),
      cppOutput: document.getElementById('cpp-output'),
      simStatus: document.getElementById('sim-status'),
      dashboardState: document.getElementById('dashboard-state'),
      dashboardStep: document.getElementById('dashboard-step'),
      dashboardCoverage: document.getElementById('dashboard-coverage'),
      coverageProgress: document.getElementById('coverage-progress-fill'),
      quickActions: document.getElementById('trigger-panel'),
      btnPlay: document.getElementById('btn-play'),
      btnPause: document.getElementById('btn-pause'),
      speedRange: document.getElementById('speed-range'),
      btnAiExport: document.getElementById('btn-ai-export')
    };
  }

  /**
   * アプリケーションの初期化とイベントリスナーの登録を行います。
   * SSOT Section 2.1 / 3.1 遵守。
   */
  init() {
    console.log("UIController V52: Initializing System...");

    // 1. セッション復旧または新規セッション生成
    const savedData = localStorage.getItem('dplus_model_v52');
    if (savedData && this.els.editor) {
      this.els.editor.value = savedData;
    } else if (this.els.editor) {
      // 新規セッション用のデフォルトテンプレート (Section 3.1.1)
      this.els.editor.value = `// Format D+++ V52 New Session\n\nTable A: States\n| ID | Entry | Exit | Invariant |\n|:---|:---|:---|:---|\n| Idle | - | - | - |\n\nTable B: Transitions\n| Priority | Source | Trigger | Guard | Action | Target |\n|:---|:---|:---|:---|:---|:---|\n\nTable C: Test Cases\n| ID | Initial | Scenario | Context | Expected |\n|:---|:---|:---|:---|:---|\n`;
    }

    // 2. エディタ監視 (Debounce 500ms)
    this.els.editor?.addEventListener('input', () => {
      this.onEditorInput();
      // 永続化プロトコル: 入力ごとに localStorage へ保存 (Section 3.1.4)
      localStorage.setItem('dplus_model_v52', this.els.editor.value);
    });

    // 3. エディタとガターのスクロール同期
    this.els.editor?.addEventListener('scroll', () => {
      if (this.els.gutter && this.els.editor) {
        this.els.gutter.scrollTop = this.els.editor.scrollTop;
      }
    });

    // 4. シミュレーション制御ボタンの配線
    document.getElementById('btn-start')?.addEventListener('click', () => this.simCtrl.startSimulation());
    document.getElementById('btn-step')?.addEventListener('click', () => this.simCtrl.step());
    document.getElementById('btn-sim-undo')?.addEventListener('click', () => this.simCtrl.undo());
    this.els.btnPlay?.addEventListener('click', () => this.simCtrl.startAutoPlay());
    this.els.btnPause?.addEventListener('click', () => this.simCtrl.stopAutoPlay());
    this.els.speedRange?.addEventListener('input', (e) => this.simCtrl.setSpeed(e.target.value));

    // 5. テスト実行ボタンの配線 (Section 2.1.4)
    document.getElementById('btn-run-test')?.addEventListener('click', () => {
      this.renderer.showToast("Batch Runner starting...", "info");
      setTimeout(() => this.simCtrl.runBatchTest(), 50);
    });

    // 6. 表示・レイアウト制御の配線
    document.getElementById('btn-layout-td')?.addEventListener('click', () => { this.layout = 'TD'; this._parseAndRender(); });
    document.getElementById('btn-layout-lr')?.addEventListener('click', () => { this.layout = 'LR'; this._parseAndRender(); });
    document.getElementById('btn-zoom-in')?.addEventListener('click', () => { this.zoom += 0.1; this.renderer.applyZoom(); });
    document.getElementById('btn-zoom-out')?.addEventListener('click', () => { this.zoom = Math.max(0.1, this.zoom - 0.1); this.renderer.applyZoom(); });
    document.getElementById('btn-zoom-reset')?.addEventListener('click', () => { this.zoom = 1.0; this.renderer.applyZoom(); });

    // 7. エクスポート・モーダル関連
    document.getElementById('btn-gen-cpp')?.addEventListener('click', () => {
      const exporter = new DPlusPlusExporter(this);
      exporter.showCodeModal('cpp');
    });
    this.els.btnAiExport?.addEventListener('click', () => {
      const exporter = new DPlusPlusExporter(this);
      exporter.exportAIContext();
    });
    document.getElementById('btn-download')?.addEventListener('click', () => {
      const exporter = new DPlusPlusExporter(this);
      exporter.exportSvg();
    });
    document.getElementById('btn-close-modal')?.addEventListener('click', () => {
      if (this.els.modal) this.els.modal.style.display = 'none';
    });
    document.getElementById('btn-copy-code')?.addEventListener('click', () => {
      this.els.cppOutput?.select();
      document.execCommand('copy');
      this.renderer.showToast("Copied to clipboard!", "success");
    });

    // 8. タブ切り替え
    this.els.tabs.forEach(tab => {
      tab.addEventListener('click', (e) => this._switchTab(e.target.dataset.target));
    });

    // 9. 初回レンダリングの実行
    this._parseAndRender();
    console.log("UIController V52: System Online.");
  }

  /**
   * エディタ入力を検知し、指定時間経過後に解析を実行します。
   */
  onEditorInput() {
    clearTimeout(this.debounceTimer);
    this.debounceTimer = setTimeout(() => this._parseAndRender(), 500);
  }

/**
   * テキストを解析し、Mermaid図と解析レポートを更新します。
   */
  async _parseAndRender() {
    try {
      const code = this.els.editor?.value || "";
      
      // 1. DPlusPlusParser による構造化
      this.data = this.parser.parse(code);

      // 【重要：追加】Analyzer の内部データを最新のパース結果で更新する
      if (this.analyzer) {
        this.analyzer.states = this.data.states;
        this.analyzer.transitions = this.data.transitions;
      }

      // 2. DPlusPlusAnalyzer による静的解析を実行
      this.analyzer.analyzeAll();

      // 3. Renderer による描画（V51回帰プラン適用済み）
      await this.renderer.renderMermaid();

      // 4. 解析結果のUI表示
      this.renderer.renderAnalysis(this.analyzer.report);

    } catch (e) {
      console.error("[UIController] Parse/Render Pipeline Failure:", e);
    }
  }

  /**
   * ファイルを読み込む際、既存データの上書きを確認します。
   * SSOT Section 3.1.2 遵守。
   */
  importFile(event) {
    const file = event.target.files[0];
    if (!file) return;

    // 破壊的操作の保護
    if (this.els.editor && this.els.editor.value.trim().length > 0) {
      if (!window.confirm("Current editor content will be overwritten. Are you sure?")) {
        return;
      }
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      if (this.els.editor) {
        this.els.editor.value = e.target.result;
        this.onEditorInput();
      }
    };
    reader.readAsText(file);
  }

  /**
   * 現在のコンテキスト（変数のスナップショット）を取得します。
   */
analyzeVariables() {
    const vars = {}; 
    const meta = {};
    const keywords = new Set(['true', 'false', 'null', 'undefined', 'NaN', 'Math', 'OR', 'AND']);

    // スキャナー本体（ここは変更なし）
    const scan = (str) => {
      if (!str || str === '-') return;

      // 数値型の推定
      const rangeMatch = str.match(/([a-zA-Z_][\w-]*)\s*(<|>|<=|>=)/g);
      if (rangeMatch) {
        rangeMatch.forEach(m => {
          const v = m.match(/([a-zA-Z_][\w-]*)/)[1];
          if (!keywords.has(v)) meta[v] = 'number';
        });
      }

      // 真偽値型の推定
      const boolMatch = str.match(/([a-zA-Z_][\w-]*)\s*(==|!=|=)\s*(true|false)|!([a-zA-Z_][\w-]*)/g);
      if (boolMatch) {
        boolMatch.forEach(m => {
          const v = m.match(/([a-zA-Z_][\w-]*)/)?.[1] || m.match(/!([a-zA-Z_][\w-]*)/)?.[1];
          if (v && !keywords.has(v)) meta[v] = 'boolean';
        });
      }

      // 識別子の抽出
      const allMatch = str.match(/\b[a-zA-Z_][\w-]*\b/g);
      if (allMatch) {
        allMatch.forEach(v => {
          if (!keywords.has(v) && !/^\d+$/.test(v)) {
            if (!vars.hasOwnProperty(v)) vars[v] = 0; 
          }
        });
      }
    };

    // --- 修正箇所 ---
    // Table A: 全ての要素が変数に関係する（Entry, Exit, Invariant）
    this.data.states.forEach(s => { 
      scan(s.entry); 
      scan(s.exit); 
      scan(s.invariant); 
    });

    // Table B: Guard と Action のみをスキャンし、Trigger（イベント名）は除外する
    this.data.transitions.forEach(t => { 
      // scan(t.trigger); // ← ここを削除
      scan(t.guard); 
      scan(t.action); 
    });

    this.varMeta = meta; 
    return vars;
}

  /**
   * カバレッジ率を計算します。
   * @returns {number} 0-100 の整数
   */
  calculateCoverage() {
    if (!this.data.transitions || this.data.transitions.length === 0) return 0;
    
    // 現在のセッションまたはテストで通過したユニークな遷移をカウント
    const visited = this.data.transitions.filter(t => this.coverageSet.has(t.lineIndex)).length;
    return Math.round((visited / this.data.transitions.length) * 100);
  }

  /**
   * 指定した行番号へジャンプ（フォーカス）します。
   * @param {number} lineIndex 
   */
  jumpToLine(lineIndex) {
    if (!this.els.editor) return;
    const text = this.els.editor.value;
    const lines = text.split('\n');
    let startPos = 0;
    for (let i = 0; i < lineIndex; i++) {
      startPos += (lines[i]?.length || 0) + 1;
    }
    this.els.editor.focus();
    this.els.editor.setSelectionRange(startPos, startPos + (lines[lineIndex]?.length || 0));
    
    // スクロール同期 (line-height 21px 想定)
    this.els.editor.scrollTop = (lineIndex * 21) - (this.els.editor.clientHeight / 2);
  }

  /**
   * タブパネルを切り替えます。
   * @private
   */
  _switchTab(targetId) {
    if (!this.els.panes || !this.els.tabs) return;
    this.els.panes.forEach(p => p.style.display = p.id === targetId ? 'flex' : 'none');
    this.els.tabs.forEach(t => t.classList.toggle('active', t.dataset.target === targetId));
  }
}



    window.addEventListener('DOMContentLoaded', () => {
        try {
            console.log("HACE Engine V52 Full: System Booting...");
            
            if (typeof UIController !== 'undefined') {
                const ui = new UIController();
                window.ui = ui;
                ui.init();
            }

            // Gutter Sync (B-02)
            const editor = document.getElementById('editor');
            const gutter = document.getElementById('gutter');
            const syncGutter = () => {
                const lines = editor.value.split('\n').length;
                gutter.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
            };
            editor.addEventListener('input', syncGutter);
            editor.addEventListener('scroll', () => { gutter.scrollTop = editor.scrollTop; });
            syncGutter();

            console.log("HACE Engine V52 Full: System Online (SSOT Compliant).");
        } catch (e) {
            console.error("Critical Boot Error:", e);
        }
    });
</script>
